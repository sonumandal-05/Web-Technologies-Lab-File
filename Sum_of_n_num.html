<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sum of N Numbers</title>
</head>
<body>

<h2>Find Largest N Numbber</h2>
<input type="number" id="num" placeholder="Enter a Number"><br><br>
<button onclick="findSum()">Find Sum</button>
<p id="result"></p>
<script>
    function findSum(){
        let n = Number(document.getElementById("num").value);
        let sum = 0;
        for(let i=1; i<=n; i++){
            sum += i;
        }
        document.getElementById("result").innerHTML = "Sum of first " + n + " numbers is: " + sum;
    }
</script>
    
</body>
</html>
