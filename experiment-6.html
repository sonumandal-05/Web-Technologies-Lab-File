<!DOCTYPE html>
<html>
<head>
    <title>My Styled Page</title>

    <style>
        body {
            font-family: Arial;
            background-color: #f0f0f0;
            text-align: center;
            color: darkblue;
        }

        h1 {
            margin-top: 20px;
        }

        p {
            color: #333;
            font-size: 18px;
        }

        .box {
            background-color: white;
            padding: 20px;
            margin: 40px auto;
            width: 320px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        button {
            background-color: blue;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: darkblue;
        }
    </style>

</head>

<body>

<div class="box">
    <h1>Welcome Students</h1>
    <p>This is a simple webpage designed using HTML and CSS.</p>
    <button>Click Me</button>
</div>

</body>
</html>
