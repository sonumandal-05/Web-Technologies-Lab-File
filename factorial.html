<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Factorial</title>
</head>
<body>
    
<h2>Factorial</h2>
<input type="number" id="num" placeholder="Enter a number"><br><br>
<button onclick="findFactorial()">Find Factorial</button>
<p id="result"></p>
<script>
    function findFactorial(){
        let n = Number(document.getElementById("num").value);
        let factorial = 1;
        for(let i=1; i<=n; i++){
            factorial *= i;
        }
        document.getElementById("result").innerHTML = "Factorial of " + n + " is: " + factorial;
    }
</script>


</body>
</html>
