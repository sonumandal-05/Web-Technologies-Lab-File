<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Largest Number</title>
</head>
<body>

<h2>Find the Largest Number</h2>
<input type="number" id="num1" placeholder="Enter first number"><br><br>
<input type="number" id="num2" placeholder="Enter second number"><br><br>
<button onclick="findLargest()">Find Largest</button>
<p id="result"></p>

<script>
    function findLargest(){
        let a= Number(document.getElementById("num1").value);
        let b= Number(document.getElementById("num2").value);
        if(a > b){
            document.getElementById("result").innerHTML = a + " is the largest number.";
        } else if(b > a){
            document.getElementById("result").innerHTML = b + " is the largest number.";
        } else {
            document.getElementById("result").innerHTML = "Both numbers are equal.";
        }
    }
</script>



    
</body>
</html>
